[pytest]
pythonpath = src
testpaths = tests
python_files = test_*.py
addopts = --maxfail=0 --continue-on-collection-errors
markers =
    uma: requires UMA (fairchem-core) to be installed
    mace: requires MACE (mace-torch) to be installed
    sevenn: requires SevenNet to be installed
    slow: marks tests as slow (deselect with '-m "not slow"')
