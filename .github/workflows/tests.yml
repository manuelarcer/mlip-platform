name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: diff-cover compares against origin/main.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with dev deps
        run: |
          python -m pip install --upgrade pip
          # asetools comes from GitHub via setup.py's direct reference; no
          # separate install step, so CI exercises the same path users run.
          pip install -e ".[dev]"

      - name: Run test suite with coverage
        run: pytest --cov=mlip_platform --cov-report=xml

      - name: Diff coverage gate (>= 90% on changed lines)
        run: |
          git fetch origin main
          diff-cover coverage.xml --compare-branch=origin/main --fail-under=90 --exclude setup.py --exclude "scripts/*"
